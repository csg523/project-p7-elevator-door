; =============================================================================
; p7-elevator-door — PlatformIO Configuration
; =============================================================================

; -----------------------------------------------------------------------------
; [env:esp32dev]  — Production firmware build
; Flash with:  pio run --target upload
; Monitor with: pio device monitor
; -----------------------------------------------------------------------------
[env:esp32dev]
platform      = espressif32
board         = ttgo-lora32-v1
framework     = espidf
monitor_speed = 115200
upload_port   = COM5
monitor_port  = COM5

build_flags =
    -std=gnu99
    -DCONFIG_FREERTOS_HZ=1000
    -DCONFIG_ESP_TASK_WDT=y
    -DCONFIG_ESP_TASK_WDT_TIMEOUT_S=5

; -----------------------------------------------------------------------------
; [env:test_fsm]  — FSM unit test build
;
; Run with:  pio test --environment test_fsm
;
; What this environment does:
;   1. Compiles ONLY src/fsm/door_fsm.c (test_build_src_filter excludes all
;      other src/ files — hal, safety, nvs, dispatcher, logger, app_main).
;   2. -DFSM_UNIT_TEST exposes fsm_process_event_test() / fsm_reset_for_test()
;      inside door_fsm.c for white-box testing without a task loop.
;   3. PlatformIO discovers test/test_fsm/test_door_fsm.c automatically.
;   4. All external symbols (hal_motor_*, fault_nvs_*, esp_timer_*) are stubs
;      defined inside test_door_fsm.c — no real drivers are compiled.
; -----------------------------------------------------------------------------
[env:test_fsm]
platform      = espressif32
board         = ttgo-lora32-v1
framework     = espidf
monitor_speed = 115200
upload_port   = COM5
monitor_port  = COM5

build_flags =
    -std=gnu99
    -DFSM_UNIT_TEST

; Only compile the FSM source — everything else is stubbed in the test file.
build_src_filter = +<fsm/door_fsm.c>

; Do not treat warnings as errors (Unity emits a few on ESP-IDF).
build_unflags = -Werror

[platformio]
default_envs = esp32dev
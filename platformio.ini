; =============================================================================
; p7-elevator-door — PlatformIO Configuration
; =============================================================================
[env:esp32dev]
platform      = espressif32
board         = ttgo-lora32-v1
framework     = espidf
monitor_speed = 115200
upload_port   = COM5
monitor_port  = COM5

build_flags =
    -std=gnu99
    -DCONFIG_FREERTOS_HZ=1000
    -DCONFIG_ESP_TASK_WDT=y
    -DCONFIG_ESP_TASK_WDT_TIMEOUT_S=5


[env:test_fsm]
platform      = espressif32
board         = ttgo-lora32-v1
framework     = espidf
monitor_speed = 115200
upload_port   = COM5
monitor_port  = COM5

build_flags =
    -std=gnu99
    -DFSM_UNIT_TEST

; Only compile the FSM source — everything else is stubbed in the test file.
build_src_filter = +<fsm/door_fsm.c>

; Do not treat warnings as errors (Unity emits a few on ESP-IDF).
build_unflags = -Werror

[platformio]
default_envs = esp32dev
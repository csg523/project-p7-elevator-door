; ============================================================
; Elevator Door Safety Controller
; Target: LilyGO TTGO T-Display (ESP32 + ST7789 TFT)
; ============================================================

[env:esp32dev]
platform   = espressif32
board      = ttgo-lora32-v1
framework  = arduino

monitor_speed  = 115200
upload_port    = COM5
monitor_port   = COM5

; Keep all build_flags contiguous (no blank lines) and indented!
build_flags =
    -Isrc
    -Iinclude
    -DCORE_DEBUG_LEVEL=0
    -DENABLE_DISPLAY=1
    -DUSER_SETUP_LOADED=1
    -include include/User_Setup.h

lib_deps =
    bodmer/TFT_eSPI@^2.5.43

monitor_filters = esp32_exception_decoder